<style>
  :root{
    --paper:#FAFAF8;--card:#fff;--ink:#111110;--stone:#66625B;--hair:#E9E6E0;
    --gold:#B08D4F;--gold-text:#8A672B;--royal:#6B4E9B;--ok:#2E7D46;--danger:#B3402F;--warn:#8A6218;
    --sh:0 1px 2px rgba(17,17,16,.04),0 8px 24px rgba(17,17,16,.06);
    --shl:0 2px 4px rgba(17,17,16,.05),0 18px 44px rgba(17,17,16,.12);
    --radius:18px;--ease:cubic-bezier(.22,.8,.24,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  input,textarea,select{font:inherit;color:inherit;width:100%;background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:12px 14px}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  h1,h2,h3{font-family:'Inter Tight',sans-serif;letter-spacing:-.02em;line-height:1.15}
  a{color:inherit}
  a:focus-visible,button:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:8px}

  .center{min-height:100svh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
  .verifying{display:flex;flex-direction:column;align-items:center;gap:16px;color:var(--stone);font-size:14px}
  .ring{width:34px;height:34px;border-radius:50%;border:3px solid var(--hair);border-top-color:var(--gold);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){.ring{animation:none}}

  .card{background:var(--card);border:1px solid var(--hair);border-radius:22px;padding:38px 30px;max-width:400px;width:100%;box-shadow:var(--shl);text-align:center;position:relative;overflow:hidden}
  .card::after{content:"";position:absolute;top:0;left:30px;right:30px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.6}
  .icon-3d{position:relative;display:grid;place-items:center;margin:0 auto;width:62px;height:62px;border-radius:20px;color:#3E3A33;background:radial-gradient(circle at 30% 20%, rgba(255,255,255,.96), rgba(255,255,255,.35) 42%, transparent 72%),linear-gradient(145deg,#FFFFFF,#EAE5DB);border:1px solid rgba(255,255,255,.9);box-shadow:inset 2px 2px 5px rgba(255,255,255,.95),inset -3px -3px 8px rgba(17,17,16,.07),0 10px 20px rgba(17,17,16,.10)}
  .icon-3d svg{width:29px;height:29px;filter:drop-shadow(0 2px 2px rgba(17,17,16,.14))}
  h1{font-size:23px;margin-top:14px}
  .sub{color:var(--stone);font-size:13.5px;margin-top:6px}
  .g-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;margin-top:26px;padding:15px 20px;border-radius:14px;border:1px solid var(--hair);background:var(--card);font-weight:600;font-size:15px;box-shadow:var(--sh);transition:transform .25s var(--ease), box-shadow .25s;min-height:52px}
  .g-btn:active{transform:scale(.98)}
  .g-btn:disabled{opacity:.6;pointer-events:none}
  .msg{margin-top:16px;font-size:13.5px;border-radius:12px;padding:12px 14px;display:none;text-align:left}
  .msg.show{display:block}
  .msg.err{background:#FBF1EF;color:var(--danger);border:1px solid #EAD6D1}
  .msg.info{background:#F3F6F4;color:var(--ok);border:1px solid #D6E6DB}

  /* App */
  #app{display:none}
  header.bar{position:sticky;top:0;z-index:40;background:rgba(250,250,248,.9);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair)}
  .bar-in{max-width:820px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:12px}
  .bar-in .who{font-size:11px;color:var(--gold-text);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
  .bar-in h2{font-size:16px}
  .avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1px solid var(--hair)}
  .logout{margin-left:auto;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--hair);background:var(--card);border-radius:999px;padding:9px 14px;font-weight:600;font-size:13px;box-shadow:var(--sh);min-height:40px}
  .logout:active{transform:scale(.97)}
  .cloud{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--stone);padding:6px 12px;border-radius:999px;background:var(--card);border:1px solid var(--hair)}
  .cloud .dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .cloud.saving .dot{background:var(--warn)}

  .wrap{max-width:820px;margin:0 auto;padding:20px 16px 80px}
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:14px 16px;position:sticky;top:62px;z-index:30;background:rgba(250,250,248,.92);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:9px 16px;border-radius:999px;border:1px solid var(--hair);background:var(--card);font-weight:600;font-size:13.5px;color:var(--stone)}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .panel{display:none}
  .panel.on{display:block;animation:fade .4s var(--ease)}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .item{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--sh)}
  .item .thumb{width:56px;height:56px;border-radius:12px;object-fit:cover;flex:0 0 auto;background:#EDEAE4;display:grid;place-items:center;overflow:hidden}
  .item .ti{flex:1;min-width:0}
  .item .ti b{font-family:'Inter Tight';font-size:15.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .ti .sub{font-size:12.5px;color:var(--stone);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .st{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
  .st-pub{background:#EFF6F0;color:#25693A}
  .st-hid{background:#FBF1EF;color:#9C3524}
  .acts{display:flex;gap:6px;flex:0 0 auto}
  .icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--hair);background:var(--card);display:grid;place-items:center;font-size:15px}
  .icon-btn:active{transform:scale(.94)}

  .card-form{background:var(--card);border:1px solid var(--hair);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--stone);margin:14px 0 6px}
  label:first-child{margin-top:0}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;padding:13px 22px;font-weight:600;font-size:14.5px;min-height:46px;transition:transform .2s}
  .btn:active{transform:scale(.97)}
  .btn-solid{background:var(--ink);color:#fff}
  .btn-line{background:var(--card);border:1px solid var(--hair)}
  .btn-block{width:100%}
  .form-acts{display:flex;gap:10px;margin-top:18px}
  .hint{font-size:12px;color:#767168;margin-top:8px}
  .dash-hi h2{font-size:22px}
  .dash-hi p{color:var(--stone);font-size:14px;margin-top:4px}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}
  .stat-card{background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:16px;box-shadow:var(--sh);text-align:left;width:100%;display:block;transition:transform .2s var(--ease),box-shadow .2s}
  .stat-card:active{transform:scale(.97)}
  @media(hover:hover){.stat-card:hover{box-shadow:var(--shl);transform:translateY(-2px)}}
  .stat-card .go{display:inline-block;margin-top:10px;font-size:12px;font-weight:600;color:var(--gold-text)}
  .stat-card .sn{font-family:'Inter Tight';font-size:28px;font-weight:700}
  .stat-card .sl{font-size:12.5px;color:var(--stone);margin-top:2px}
  .toast{pointer-events:none;position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;font-size:14px;font-weight:500;opacity:0;transition:all .3s var(--ease);z-index:100;box-shadow:var(--shl)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .drag-handle{width:34px;height:44px;flex:0 0 auto;display:grid;place-items:center;font-size:20px;color:#B0A99E;cursor:grab;touch-action:none;letter-spacing:-2px}
  .drag-handle:active{cursor:grabbing;color:var(--gold)}
  .gal-row{transition:box-shadow .2s}
  .gal-row.dragging{box-shadow:var(--shl);opacity:.96}
  .gal-placeholder{border:2px dashed var(--gold);border-radius:16px;margin-bottom:12px;background:#FBF6EC}
  .empty-note{text-align:center;color:var(--stone);font-size:14px;padding:30px 20px;background:var(--card);border:1px dashed var(--hair);border-radius:16px}

  .maint-card{margin-top:18px;padding:16px;border:1px dashed var(--line,#d8d2c4);border-radius:14px;background:#faf8f3}
  .maint-t{font-weight:700;font-size:14px;margin-bottom:4px}
  .maint-p{font-size:13px;color:#6b6459;line-height:1.5;margin-bottom:12px}

  /* ---------- Analítica ---------- */
  .ana-filter{display:flex;gap:8px;margin:16px 0 18px}
  .ana-chip{flex:1;padding:9px 0;border:1px solid var(--line,#d8d2c4);background:#fff;border-radius:10px;font-size:13px;font-weight:600;color:#6b6459;cursor:pointer}
  .ana-chip.on{background:#111;color:#fff;border-color:#111}
  .ana-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
  .ana-card{background:var(--card,#fff);border:1px solid var(--hairline,#eee);border-radius:14px;padding:16px 8px;text-align:center}
  .ana-card .ana-n{font-family:'Inter Tight',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.02em;color:#111}
  .ana-card .ana-l{font-size:11.5px;color:#6b6459;margin-top:2px}
  .ana-h{font-size:14px;font-weight:700;margin:24px 0 12px}
  .ana-bar{margin-bottom:12px}
  .ana-bar-top{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px}
  .ana-bar-top b{font-weight:700}
  .ana-track{height:9px;background:#efeae0;border-radius:6px;overflow:hidden}
  .ana-fill{height:100%;background:linear-gradient(90deg,#B8860B,#8A672B);border-radius:6px;transition:width .4s ease}
  .ana-ref{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--hairline,#eee);font-size:14px}
  .ana-ref b{font-weight:700}
  .stat-wide{grid-column:1 / -1;display:flex;align-items:center;justify-content:space-between;text-align:left}

  .conv-box{background:var(--card,#fff);border:1px solid var(--hairline,#eee);border-radius:16px;padding:6px 16px;margin-top:10px}
  .conv-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--hairline,#eee)}
  .conv-row:last-child{border-bottom:0}
  .conv-row b{font-family:'Inter Tight',sans-serif;font-size:24px;display:block;letter-spacing:-.02em}
  .conv-row span{font-size:12.5px;color:#6b6459}
  .conv-d{font-size:12.5px;color:#6b6459;text-align:right;max-width:48%;line-height:1.45}
  .ana-ref i{font-style:normal;color:#8B857B;font-weight:500;font-size:12.5px}
  .ana-tip{font-size:12.5px;color:#6b6459;line-height:1.55;background:#faf8f3;border:1px dashed #d8d2c4;border-radius:12px;padding:12px 14px;margin-top:20px}
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5EuL7wMb95SRafwcvmBThK5jv-d6H_jA",
    authDomain: "oficina-digital-tomas.firebaseapp.com",
    projectId: "oficina-digital-tomas",
    storageBucket: "oficina-digital-tomas.firebasestorage.app",
    messagingSenderId: "898342341243",
    appId: "1:898342341243:web:7ee15b8b3533f3889570de"
  };
  const ADMIN_EMAIL = "florestomas323@gmail.com";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // --- Foto sin Storage: comprime a un base64 pequeño para guardar en Firestore (<1MB) ---
  async function subirFoto(file, carpeta){
    const dataUrl = await new Promise((res,rej)=>{
      const fr = new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(file);
    });
    const img = await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=dataUrl; });
    // tamaño moderado (máx 900px) y calidad 0.72 para que pese poco
    const max = 900;
    let w = img.width, hh = img.height;
    if(w > max){ hh = Math.round(hh * max / w); w = max; }
    const canvas = document.createElement("canvas"); canvas.width=w; canvas.height=hh;
    canvas.getContext("2d").drawImage(img,0,0,w,hh);
    let q = 0.72;
    let out = canvas.toDataURL("image/jpeg", q);
    // si sigue pesando mucho, bajar calidad hasta caber bajo ~700KB
    while(out.length > 700000 && q > 0.4){ q -= 0.1; out = canvas.toDataURL("image/jpeg", q); }
    return out;
  }

  const $ = (id) => document.getElementById(id);
  const view = (w) => {
    $("loadingView").style.display = w==="loading"?"flex":"none";
    $("loginView").style.display   = w==="login"?"flex":"none";
    $("app").style.display         = w==="app"?"block":"none";
  };
  const toast = (t) => { const el=$("toast"); el.textContent=t; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2600); };

  function clean(obj){
    if(Array.isArray(obj)) return obj.map(clean).filter(v=>v!==undefined);
    if(obj && typeof obj==="object"){
      const o={};
      for(const k in obj){ const v=clean(obj[k]); if(v!==undefined) o[k]=v; }
      return o;
    }
    return obj===undefined ? null : obj;
  }

  // ---------- Limpieza de duplicados ----------
  async function dedupeCollection(coll, sigFn){
    const snap = await getDocs(collection(db, coll));
    const seen = new Set();
    const toDelete = [];
    snap.docs
      .slice()
      .sort((a,b)=>((a.data().order||0)-(b.data().order||0)))
      .forEach(d=>{
        const sig = sigFn(d.data() || {});
        if(seen.has(sig)) toDelete.push(d.id);
        else seen.add(sig);
      });
    for(let k=0; k<toDelete.length; k+=400){
      const batch = writeBatch(db);
      toDelete.slice(k, k+400).forEach(id=> batch.delete(doc(db, coll, id)));
      await batch.commit();
    }
    return toDelete.length;
  }

  async function countDuplicates(){
    try{
      const g = (await getDocs(collection(db,"gallery"))).docs;
      const r = (await getDocs(collection(db,"testimonials"))).docs;
      const s = (await getDocs(collection(db,"upcoming"))).docs;
      function dupes(docs, sigFn){
        const seen=new Set(); let n=0;
        docs.forEach(d=>{ const sig=sigFn(d.data()||{}); if(seen.has(sig)) n++; else seen.add(sig); });
        return n;
      }
      return dupes(g, d=>(d.src||'')+'|'+(d.alt||'')+'|'+(d.tag||''))
           + dupes(r, d=>(d.name||'')+'|'+(d.text||''))
           + dupes(s, d=>(d.name||''));
    }catch(e){ return 0; }
  }

      setCloud(true);
      toast("Limpiando duplicados…");
      const g = await dedupeCollection("gallery",      d=>(d.src||'')+'|'+(d.alt||'')+'|'+(d.tag||''));
      const r = await dedupeCollection("testimonials", d=>(d.name||'')+'|'+(d.text||''));
      const s = await dedupeCollection("upcoming",     d=>(d.name||''));
      await loadAll(); renderAll();
      setCloud(false);
      const total = g+r+s;
      if(total>0) toast("✓ Se quitaron "+total+" duplicados ("+g+" fotos, "+r+" opiniones, "+s+" próximos)");
      else toast("✓ No había duplicados. Todo limpio.");
    }catch(e){ console.error(e); setCloud(false); toast("No se pudo limpiar. Revisa tu conexión e inténtalo otra vez."); }

  // ---- Arrastre táctil para reordenar la galería ----
  function initGalDrag(){
    const list = $("galList"); if(!list) return;
    let dragEl=null, dragIdx=-1, startY=0, curY=0, placeholder=null;

    list.querySelectorAll(".gal-row").forEach(row=>{
      const handle = row.querySelector(".drag-handle");
      if(!handle) return;
      const start = (clientY)=>{
        dragEl = row; dragIdx = parseInt(row.dataset.idx,10);
        startY = clientY; curY = clientY;
        row.classList.add("dragging");
        placeholder = document.createElement("div");
        placeholder.className = "gal-placeholder";
        placeholder.style.height = row.offsetHeight+"px";
        row.parentNode.insertBefore(placeholder, row.nextSibling);
        row.style.position="relative"; row.style.zIndex="50";
        document.body.style.userSelect="none";
      };
      const move = (clientY)=>{
        if(!dragEl) return;
        curY = clientY;
        const dy = curY - startY;
        dragEl.style.transform = "translateY("+dy+"px)";
        // encontrar sobre qué fila estamos
        const rows = [...list.querySelectorAll(".gal-row:not(.dragging)")];
        const dragRect = dragEl.getBoundingClientRect();
        const dragMid = dragRect.top + dragRect.height/2;
        let ref=null;
        for(const r of rows){
          const rect=r.getBoundingClientRect();
          if(dragMid < rect.top + rect.height/2){ ref=r; break; }
        }
        if(ref) list.insertBefore(placeholder, ref);
        else list.appendChild(placeholder);
      };
      const end = async ()=>{
        if(!dragEl) return;
        const rows=[...list.querySelectorAll(".gal-row, .gal-placeholder")];
        const newPos = rows.indexOf(placeholder);
        dragEl.style.transform=""; dragEl.style.position=""; dragEl.style.zIndex="";
        dragEl.classList.remove("dragging");
        list.insertBefore(dragEl, placeholder);
        placeholder.remove();
        document.body.style.userSelect="";
        // calcular índice destino real
        let target = [...list.querySelectorAll(".gal-row")].indexOf(dragEl);
        const from = dragIdx; dragEl=null;
        if(target!==from && target>=0){ await reorderGal(from, target); }
      };

      // touch
      handle.addEventListener("touchstart", e=>{ e.preventDefault(); start(e.touches[0].clientY); }, {passive:false});
      list.addEventListener("touchmove", e=>{ if(dragEl){ e.preventDefault(); move(e.touches[0].clientY);} }, {passive:false});
      handle.addEventListener("touchend", end);
      // mouse (por si usa compu)
      handle.addEventListener("mousedown", e=>{ e.preventDefault(); start(e.clientY);
        const mm=ev=>move(ev.clientY); const mu=()=>{ end(); document.removeEventListener("mousemove",mm); document.removeEventListener("mouseup",mu); };
        document.addEventListener("mousemove",mm); document.addEventListener("mouseup",mu);
      });
    });
  }

  var ANALYTICS = null, anaRange = 7;
  function anaEsc(s){ return String(s||'').replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  async function loadAnalytics(force){
    if(ANALYTICS && !force) return ANALYTICS;
    const snap = await getDocs(collection(db, "analytics_clicks"));
    ANALYTICS = snap.docs.map(function(d){
      const x = d.data() || {};
      let t = 0;
      if(x.createdAt && typeof x.createdAt.toMillis === "function") t = x.createdAt.toMillis();
      else if(x.createdAt && x.createdAt.seconds) t = x.createdAt.seconds * 1000;
      return { label:x.label||"?", vid:x.vid||"", sid:x.sid||"", src:x.src||"", dev:x.dev||"",
               page:x.page||"", ref:x.referrer||"", t:t };
    });
    return ANALYTICS;
  }

  window.setAnaRange = function(d){ anaRange = d; renderAnalytics(); };
  window.reloadAnalytics = async function(){ try{ await loadAnalytics(true); }catch(e){} renderAnalytics(); };

  // Un evento cuenta como CONTACTO si el visitante intentó comunicarse
  const ES_CONTACTO = ["WhatsApp","Solicitar servicio","Consulta ciudad","WhatsApp desde receta"];
  const ES_RESERVA  = ["Reserva: abre calendario"];

  async function renderAnalytics(){
    const cont = $("p-analitica");
    if(!ANALYTICS) cont.innerHTML = '<div class="empty-note">Cargando analítica…</div>';
    let data;
    try { data = await loadAnalytics(); }
    catch(e){ cont.innerHTML = '<div class="empty-note">No se pudo cargar la analítica. Revisa tu conexión.</div>'; return; }

    const now = Date.now();
    const cut = anaRange > 0 ? now - anaRange*86400000 : 0;
    const rows = data.filter(function(r){ return anaRange===0 ? true : (r.t>0 && r.t>=cut); });

    // --- Visitas y visitantes únicos ---
    const visitas = rows.filter(function(r){ return r.label==="Visita"; });
    const unicos = new Set(visitas.map(function(r){ return r.vid; }).filter(Boolean)).size;
    const totalVisitas = visitas.length;

    // --- Conversión sobre visitantes únicos ---
    const vidsContacto = new Set(rows.filter(function(r){ return ES_CONTACTO.indexOf(r.label)>=0; }).map(function(r){ return r.vid; }).filter(Boolean));
    const vidsReserva  = new Set(rows.filter(function(r){ return ES_RESERVA.indexOf(r.label)>=0; }).map(function(r){ return r.vid; }).filter(Boolean));
    const pctContacto = unicos>0 ? Math.round(vidsContacto.size/unicos*1000)/10 : 0;
    const pctReserva  = unicos>0 ? Math.round(vidsReserva.size/unicos*1000)/10 : 0;

    // --- Agrupaciones ---
    function agrupar(lista, campo){
      const o = {};
      lista.forEach(function(r){ const k = r[campo] || "—"; o[k] = (o[k]||0)+1; });
      return Object.keys(o).sort(function(a,b){ return o[b]-o[a]; }).map(function(k){ return [k,o[k]]; });
    }
    /* Botones retirados del sitio: sus clics históricos ya no se muestran */
    const ANA_RETIRADOS = ["Categoria: Sistemas de cocina", "Categoria: Servicio y garantia"];
    const eventos = rows.filter(function(r){ return r.label!=="Visita" && ANA_RETIRADOS.indexOf(r.label)<0; });
    const porEvento = agrupar(eventos, "label");
    const porFuente = agrupar(visitas, "src");
    const porDisp   = agrupar(visitas, "dev");
    const maxEv = Math.max(1, ...porEvento.map(function(x){ return x[1]; }));

    function esc2(s){ return String(s||"").replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
    function lista(arr, total){
      if(!arr.length) return '<div class="empty-note">Sin datos todavía.</div>';
      return arr.map(function(x){
        const pct = total>0 ? Math.round(x[1]/total*100) : 0;
        return '<div class="ana-ref"><span>'+esc2(x[0])+'</span><b>'+x[1]+(total>0?' <i>('+pct+'%)</i>':'')+'</b></div>';
      }).join("");
    }

    let html = '<div class="dash-hi"><h2>Analítica</h2><p>Qué hacen tus visitantes. Se actualiza solo.</p></div>';
    html += '<div class="ana-filter">' +
      [[7,'7 días'],[30,'30 días'],[0,'Todo']].map(function(o){
        return '<button class="ana-chip'+(anaRange===o[0]?' on':'')+'" type="button" onclick="setAnaRange('+o[0]+')">'+o[1]+'</button>';
      }).join('') + '</div>';

    html += '<div class="ana-cards">' +
      '<div class="ana-card"><div class="ana-n">'+unicos+'</div><div class="ana-l">Personas únicas</div></div>' +
      '<div class="ana-card"><div class="ana-n">'+totalVisitas+'</div><div class="ana-l">Visitas totales</div></div>' +
      '<div class="ana-card"><div class="ana-n">'+eventos.length+'</div><div class="ana-l">Acciones</div></div>' +
      '</div>';

    html += '<div class="conv-box">' +
      '<div class="conv-row"><div><b>'+pctContacto+'%</b><span>Conversión a contacto</span></div><div class="conv-d">'+vidsContacto.size+' de '+unicos+' personas te escribieron</div></div>' +
      '<div class="conv-row"><div><b>'+pctReserva+'%</b><span>Conversión a reserva</span></div><div class="conv-d">'+vidsReserva.size+' de '+unicos+' abrieron el calendario</div></div>' +
      '</div>';

    html += '<h3 class="ana-h">Qué hacen en tu sitio</h3>';
    if(!porEvento.length) html += '<div class="empty-note">Aún no hay acciones en este periodo.</div>';
    else porEvento.forEach(function(x){
      const pct = Math.round(x[1]/maxEv*100);
      html += '<div class="ana-bar"><div class="ana-bar-top"><span>'+esc2(x[0])+'</span><b>'+x[1]+'</b></div>'+
              '<div class="ana-track"><div class="ana-fill" style="width:'+pct+'%"></div></div></div>';
    });

    html += '<h3 class="ana-h">De dónde llegan</h3>' + lista(porFuente, totalVisitas);
    html += '<h3 class="ana-h">Con qué dispositivo</h3>' + lista(porDisp, totalVisitas);

    html += '<p class="ana-tip">Para saber si tus QR funcionan, usa un enlace con etiqueta: <b>tomasflores.com/?utm_source=qr</b>. Lo mismo para Instagram (<b>?utm_source=instagram</b>) o TikTok (<b>?utm_source=tiktok</b>).</p>';
    html += '<button class="btn btn-line btn-block" type="button" onclick="reloadAnalytics()" style="margin-top:18px">↻ Actualizar datos</button>';
    cont.innerHTML = html;
  }

  function parseIngs(txt){
    return String(txt||"").split("\n").map(function(l){
      var p = l.split("|"); var n=(p[0]||"").trim(); var c=(p[1]||"").trim();
      return n ? [n, c || "al gusto"] : null;
    }).filter(Boolean);
  }
  function parseSteps(txt){
    return String(txt||"").split("\n").map(function(l){ return l.trim(); }).filter(Boolean);
  }
  function ingsToText(a){ return (a||[]).map(function(x){ return x[0]+" | "+x[1]; }).join("\n"); }
  function stepsToText(a){ return (a||[]).join("\n"); }
  function stripHtml(s){ return String(s||"").replace(/<[^>]*>/g,""); }
  function escA(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function recipeSlug(r){
    var id = r._id || "";
    return /^[a-z0-9-]{3,}$/.test(id) ? id : slugify(r.name);
  }

  function recipePageHTML(r){
    var slug = recipeSlug(r);
    var url = "https://tomasflores.com/receta-" + slug + ".html";
    var img = r.img || "og-image.jpeg";
    var imgUrl = /^https?:|^data:/.test(img) ? img : ("https://tomasflores.com/" + img);
    var WA = "16823811576";
    var askMsg = encodeURIComponent("Hola Tomas \ud83d\udc4b Tengo una pregunta sobre tu receta de " + stripHtml(r.name));
    var prodMsg = encodeURIComponent("Hola Tomas \ud83d\udc4b Quiero conocer m\u00e1s sobre la " + stripHtml(r.utensil||"l\u00ednea Royal Prestige"));
    var ings = r.ingredients || [];
    var steps = r.steps || [];
    var ld = {
      "@context":"https://schema.org","@type":"Recipe",
      "name":stripHtml(r.name),"description":stripHtml(r.desc||""),
      "image":imgUrl,
      "author":{"@type":"Person","name":"Tomas Flores"},
      "recipeYield":stripHtml(r.servings||""),
      "recipeIngredient":ings.map(function(x){ return (x[1]+" de "+x[0]).replace(/^al gusto de /,"").trim(); }),
      "recipeInstructions":steps.map(function(s,i){ return {"@type":"HowToStep","position":i+1,"text":stripHtml(s)}; }),
      "keywords":stripHtml(r.name)+", Royal Prestige, recetas"
    };
    var tm = String(r.time||"").match(/(?:(\d+)\s*h)?\s*(\d+)?\s*min/);
    if(tm && (tm[1]||tm[2])) ld.totalTime = "PT"+(tm[1]?tm[1]+"H":"")+(tm[2]?tm[2]+"M":"");
    var ingRows = ings.map(function(x){ return '      <li><span>'+escA(x[0])+'</span><b>'+escA(x[1])+'</b></li>'; }).join("\n");
    var stepRows = steps.map(function(s,i){ return '      <li><span class="stp-n">'+(i+1)+'</span><p>'+s+'</p></li>'; }).join("\n");

  async function softDelete(coll, id, item, label, kind){

  function trashMillis(x){
    if(x && typeof x.toMillis === "function") return x.toMillis();
    if(x && x.seconds) return x.seconds * 1000;
    return Date.now();
  }

  async function purgeOldTrash(){
    try{
      const snap = await getDocs(collection(db, "trash"));
      const cut = Date.now() - TRASH_DAYS * 86400000;
      const old = snap.docs.filter(d => trashMillis((d.data()||{}).deletedAt) < cut);
      if(!old.length) return;
      const batch = writeBatch(db);
      old.forEach(d => batch.delete(doc(db, "trash", d.id)));
      await batch.commit();
    }catch(e){ /* silencioso */ }
  }

  async function loadTrash(){
    const snap = await getDocs(collection(db, "trash"));
    TRASH = snap.docs.map(d => ({ _tid: d.id, ...(d.data()||{}) }))
      .sort((a,b) => trashMillis(b.deletedAt) - trashMillis(a.deletedAt));
  }

  window.renderTrash = async function(){

    cont.innerHTML = '<div class="empty-note">Cargando papelera…</div>';

    catch(e){ cont.innerHTML = '<div class="empty-note">No se pudo cargar la papelera. Revisa tu conexión.</div>'; return; }

    let html = '<div class="dash-hi"><h2>Papelera</h2><p>Lo que elimines espera aquí ' + TRASH_DAYS + ' días. Puedes restaurarlo o borrarlo definitivamente. Pasado ese tiempo se borra solo.</p></div>';
    if(!TRASH.length){
      html += '<div class="empty-note">La papelera está vacía. ✨</div>';
      cont.innerHTML = html; return;
    }
    TRASH.forEach(function(t, i){
      const dias = Math.max(0, TRASH_DAYS - Math.floor((Date.now() - trashMillis(t.deletedAt)) / 86400000));

  let ppRoutes=null, ppUsers=[], ppPhotos=[], ppOpenRoute='', ppEditIdx=-1;

  function ppKey(r,c){ return r.id==='t1' ? c.id : r.id+'__'+c.id; }
  function ppEsc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  async function ppLoad(){
    if(renderPassportAdmin._cached && ppRoutes) return;
    try{
      const s=await getDoc(doc(db,'settings','passport'));
      if(s.exists() && Array.isArray(s.data().routes) && s.data().routes.length){ ppRoutes=s.data().routes; }
    }catch(e){}
    if(!ppRoutes) ppRoutes=[{id:'t1',name:'Temporada 1',active:true,countries:PP_SEED}];
    try{
      const us=await getDocs(collection(db,'passportUsers'));
      ppUsers=us.docs.map(d=>({uid:d.id, ...d.data()}));
      ppUsers.sort((a,b)=>((b.createdAt&&b.createdAt.seconds)||0)-((a.createdAt&&a.createdAt.seconds)||0));
    }catch(e){ ppUsers=[]; }
    try{
      const fs=await getDocs(collection(db,'passportPhotos'));
      ppPhotos=fs.docs.map(d=>({id:d.id, ...d.data()}));
      ppPhotos.sort((a,b)=>((b.createdAt&&b.createdAt.seconds)||0)-((a.createdAt&&a.createdAt.seconds)||0));
    }catch(e){ ppPhotos=[]; }
  }

  function ppUserProg(u){
    const s=u.stamps||{};
    let best=null;
    ppRoutes.forEach(r=>{
      const done=r.countries.filter(c=>s[ppKey(r,c)]).length;
      if(done>0 || r===ppRoutes[0]){
        if(!best || done/r.countries.length > best.done/best.total)
          best={route:r.name, done:done, total:r.countries.length, full:done>=r.countries.length};
      }
    });
    return best || {route:ppRoutes[0].name, done:0, total:ppRoutes[0].countries.length, full:false};
  }

  function ppSlug(s){
    return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'').slice(0,8) || ('d'+Date.now().toString(36).slice(-4));

  window.ppDelUser = async function(uid){
    const u = ppUsers.find(x=>x.uid===uid);
    if(!u) return;
    const fotos = ppPhotos.filter(f=>f.uid===uid);
    if(!confirm('\u00bfEliminar a '+(u.name||'este viajero')+' del Pasaporte?\n\nSe enviar\u00e1n a la papelera:\n\u00b7 su registro y sus sellos\n\u00b7 sus '+fotos.length+' foto(s)\n\nPodr\u00e1s restaurarlo durante 30 d\u00edas.')) return;
    if(fotos.length && !confirm('Confirma una vez m\u00e1s: se eliminar\u00e1 '+(u.name||'el viajero')+' junto con sus '+fotos.length+' foto(s).')) return;
    setCloud(true);
    try{
      for(const f of fotos){
        const copia = {}; for(const k in f){ if(k!=="id") copia[k]=f[k]; }
        await softDelete("passportPhotos", f.id, copia, "Foto de "+(u.name||"viajero")+(f.co?" \u00b7 "+f.co:""), "Foto del pasaporte");
      }
      const copiaU = {}; for(const k in u){ if(k!=="uid") copiaU[k]=u[k]; }
      await softDelete("passportUsers", u.uid, copiaU, (u.name||"Viajero")+" \u00b7 Pasaporte", "Viajero del pasaporte");
      ppPhotos = ppPhotos.filter(f=>f.uid!==uid);
      ppUsers  = ppUsers.filter(x=>x.uid!==uid);
      toast("\u2713 Viajero y sus fotos enviados a la papelera");
      renderPassportAdmin.rerender();
    }catch(e){ console.error(e); toast("No se pudo eliminar al viajero"); }
    finally{ setCloud(false); }
  };

  async function ppPDF(){
    if(!ppUsers.length){ toast("No hay participantes para exportar"); return; }
    toast("Generando PDF\u2026");
    try{
      await rygCargarScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
      await rygCargarScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js");
    }catch(e){ toast("No se pudo cargar el generador de PDF"); return; }
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:"landscape", unit:"pt", format:"letter" });
    const W = pdf.internal.pageSize.getWidth();
    const gen = new Date().toLocaleString("es-US",{dateStyle:"long",timeStyle:"short"});
    const completos = ppUsers.filter(u=>ppUserProg(u).full).length;
    const sellos = ppUsers.reduce((acc,u)=>acc+Object.keys(u.stamps||{}).length,0);

    pdf.setFont("helvetica","bold"); pdf.setFontSize(16); pdf.setTextColor(18,42,70);
    pdf.text("Pasaporte de Sabores \u2014 Participantes", 40, 46);
    pdf.setFont("helvetica","normal"); pdf.setFontSize(10); pdf.setTextColor(90,100,115);
    pdf.text("Tomas Flores \u00b7 Royal Prestige \u00b7 Generado: "+gen, 40, 62);
    pdf.text("Viajeros: "+ppUsers.length+" \u00b7 Completaron la ruta: "+completos+" \u00b7 Sellos estampados: "+sellos+" \u00b7 Fotos recibidas: "+ppPhotos.length, 40, 76);

    pdf.autoTable({
      startY: 92,
      head: [["Nombre","WhatsApp","Ciudad","Estado","Progreso","Ruta","Complet\u00f3","Registro","Fotos"]],
      body: ppUsers.map(u=>{
        const p = ppUserProg(u);
        const f = u.createdAt && u.createdAt.seconds ? new Date(u.createdAt.seconds*1000).toLocaleDateString("es-MX") : "\u2014";
        const nf = ppPhotos.filter(x=>x.uid===u.uid).length;
        return [u.name||"\u2014", u.phone||"\u2014", u.city||"\u2014", u.state||"\u2014",
                p.done+" de "+p.total, p.route||"\u2014", p.full?"S\u00ed":"No", f, String(nf)];
      }),
      margin: { left:40, right:40, bottom:44 },
      styles: { font:"helvetica", fontSize:9, cellPadding:5, overflow:"linebreak", textColor:[35,40,50], lineColor:[235,230,222], lineWidth:0.5 },
      headStyles: { fillColor:[18,42,70], textColor:255, fontStyle:"bold", fontSize:9 },
      alternateRowStyles: { fillColor:[251,249,244] },
      columnStyles: { 0:{cellWidth:110}, 1:{cellWidth:90}, 4:{cellWidth:60,halign:"center"}, 6:{cellWidth:56,halign:"center"}, 8:{cellWidth:44,halign:"center"} },
      didDrawPage: function(){
        const H = pdf.internal.pageSize.getHeight();
        pdf.setFont("helvetica","normal"); pdf.setFontSize(8); pdf.setTextColor(120,128,140);
        pdf.text("Tomas Flores \u00b7 Pasaporte de Sabores \u00b7 "+gen, 40, H-22);
        pdf.text("P\u00e1gina "+pdf.internal.getNumberOfPages(), W-40, H-22, { align:"right" });
      }
    });
    pdf.save("pasaporte-participantes_"+rygSello()+".pdf");
    toast("\u2713 PDF descargado ("+ppUsers.length+" participantes)");
  }

  function ppBind(el){
    el.addEventListener('click', async (e)=>{
      const t=e.target;
      const del = t.closest ? t.closest("[data-ppdel]") : null;
      if(del){ ppDelUser(del.getAttribute("data-ppdel")); return; }
      if(t.id==='ppPdf'){ await ppPDF(); return; }
      if(t.id==='ppCsv'){
        let csv='Nombre,WhatsApp,Ciudad,Estado,Progreso,Ruta,Completo,Registro\n';
        ppUsers.forEach(u=>{
          const p=ppUserProg(u);
          const f=u.createdAt&&u.createdAt.seconds? new Date(u.createdAt.seconds*1000).toLocaleDateString('es-MX'):'';
          csv+='"'+String(u.name||'').replace(/"/g,'""')+'","'+String(u.phone||'')+'","'+String(u.city||'').replace(/"/g,'""')+'","'+String(u.state||'')+'","'+p.done+'/'+p.total+'","'+String(p.route).replace(/"/g,'""')+'","'+(p.full?'SI':'NO')+'","'+f+'"\n';
        });

  let rygParts = [], rygClaims = [], rygOpen = "", rygFilter = "todos", rygLoaded = false;

  function rygEsc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function rygFecha(ts){
    if(!ts) return "—";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    if(isNaN(d)) return "—";
    return d.toLocaleDateString("es-US",{day:"numeric",month:"short",year:"numeric"});
  }
  function rygTel(t){
    const d = String(t||"").replace(/\D/g,"");
    if(d.length===11 && d[0]==="1") return "("+d.slice(1,4)+") "+d.slice(4,7)+"-"+d.slice(7);
    if(d.length===10) return "("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6);
    return d||"—";
  }
  function rygMask(nombre){
    const p = String(nombre||"").trim().split(/\s+/);
    if(!p[0]) return "Contacto";
    return p[0] + (p[1] ? " " + p[1][0].toUpperCase() + "." : "");
  }
  function rygNivel(g,v){
    let n = 0;
    for(const L of RYG_LEVELS){ if(g >= L.gifts && v >= L.sales) n = L.level; }
    return n;
  }
  function rygNombrePremio(n){
    const L = RYG_LEVELS.find(x=>x.level===n);
    return L ? L.prize : "—";
  }

  async function rygLoad(force){
    if(rygLoaded && !force) return;
    const [ps, cs] = await Promise.all([
      getDocs(collection(db,"giftParticipants")),
      getDocs(collection(db,"giftClaims"))
    ]);
    rygParts  = ps.docs.map(d=>({ id:d.id, ...d.data() }));
    rygClaims = cs.docs.map(d=>({ id:d.id, ...d.data() }));
    rygParts.sort((a,b)=>{
      const ta = a.createdAt && a.createdAt.toDate ? a.createdAt.toDate().getTime() : 0;
      const tb = b.createdAt && b.createdAt.toDate ? b.createdAt.toDate().getTime() : 0;
      return tb - ta;
    });
    rygLoaded = true;
  }

  function rygDeParticipante(code){
    return rygClaims.filter(c => c.referralCode === code && !c.archived);
  }
  function rygCuenta(code){
    const cs = rygDeParticipante(code);
    return {
      total:      cs.length,
      entregados: cs.filter(c=>c.status==="gift_delivered"||c.status==="sale_confirmed").length,
      ventas:     cs.filter(c=>c.status==="sale_confirmed").length,
      validos:    cs.filter(c=>["valid","scheduled","gift_delivered","sale_confirmed"].includes(c.status)).length,
      citas:      cs.filter(c=>c.status==="scheduled").length
    };
  }
  function rygVencida(p){
    if(p.status !== "active") return true;
    const e = p.expiresAt && p.expiresAt.toDate ? p.expiresAt.toDate() : null;
    return e ? Date.now() > e.getTime() : false;
  }

  // ---------- Auditoría ----------
  async function rygAudit(action, targetId, reason, before, after){
    try{
      await addDoc(collection(db,"auditLogs"),{
        action: action,
        targetCollection: "giftClaims",
        targetId: targetId,
        reason: reason || "",
        adminEmail: (auth.currentUser && auth.currentUser.email) || "",
        before: before===undefined ? null : before,
        after:  after===undefined  ? null : after,
        at: serverTimestamp()
      });
    }catch(e){ console.error("auditoría", e); }
  }

  // ---------- Recalcular totales del participante ----------
  async function rygRecalcular(code){
    const p = rygParts.find(x=>x.id===code);
    if(!p) return;
    const n = rygCuenta(code);
    const nivel = rygNivel(n.entregados, n.ventas);
    const cs = rygDeParticipante(code).slice().sort((a,b)=>{
      const ta=a.claimedAt&&a.claimedAt.toDate?a.claimedAt.toDate().getTime():0;
      const tb=b.claimedAt&&b.claimedAt.toDate?b.claimedAt.toDate().getTime():0;
      return tb-ta;
    });
    const masked = cs.slice(0,40).map(c=>({ n: rygMask(c.recipientName), s: c.status }));
    let rewardStatus = p.rewardStatus || null;
    if(nivel > 0 && !["approved","delivered","substituted"].includes(rewardStatus)) rewardStatus = "pending_validation";
    if(nivel === 0) rewardStatus = null;

    const upd = {
      claimsTotal: n.total,
      giftsDelivered: n.entregados,
      salesConfirmed: n.ventas,
      currentLevel: nivel,
      rewardStatus: rewardStatus,
      maskedContacts: masked,
      updatedAt: serverTimestamp()
    };
    await updateDoc(doc(db,"giftParticipants",code), upd);
    Object.assign(p, upd, { currentLevel:nivel, rewardStatus:rewardStatus });

    if(nivel > 0){
      try{
        await setDoc(doc(db,"rewardRedemptions", code), {
          participantId: code,
          participantName: p.participantName || "",
          distributorId: p.distributorId || RYG_DIST.id,
          levelReached: nivel,
          prizeName: rygNombrePremio(nivel),
          status: rewardStatus,
          updatedAt: serverTimestamp()
        }, { merge:true });
      }catch(e){ console.error("recompensa", e); }
    }
  }

  // ---------- Exportaciones: CSV, PDF e impresión ----------
  function rygCargarScript(src){
    return new Promise((ok,fail)=>{
      if(document.querySelector('script[data-x="'+src+'"]')) return ok();
      const s=document.createElement("script");
      s.src=src; s.dataset.x=src;
      s.onload=()=>ok(); s.onerror=()=>fail(new Error("no se pudo cargar "+src));
      document.head.appendChild(s);
    });
  }

  function rygAlcance(scope, code){
    if(scope==="regalos") return rygAlcanceRegalos();
    let ps = rygParts.slice();
    if(scope==="participante") ps = ps.filter(p=>p.id===code);
    else if(scope==="filtrado"){
      if(rygFilter==="activos")  ps = ps.filter(p=>!rygVencida(p));
      if(rygFilter==="vencidos") ps = ps.filter(p=>rygVencida(p));
      if(rygFilter==="premio")   ps = ps.filter(p=>(p.currentLevel||0)>0);
    }
    const codes = ps.map(p=>p.id);
    const cs = rygClaims.filter(c=>!c.archived && codes.indexOf(c.referralCode)>=0);
    let etiqueta = "Todos los participantes";
    if(scope==="participante"){
      const p = rygParts.find(x=>x.id===code);
      etiqueta = "Participante: " + (p ? p.participantName : code) + " (" + code + ")";
    }else if(scope==="filtrado"){
      etiqueta = { todos:"Todos los participantes", activos:"Solo campañas activas",
                   premio:"Solo con premio desbloqueado", vencidos:"Solo campañas finalizadas" }[rygFilter] || "Filtrado";
    }
    return { participantes:ps, claims:cs, etiqueta:etiqueta };
  }

  function rygAlcanceRegalos(){
    const cs = rygDestinatarios();
    const codes = {};
    cs.forEach(function(c){ codes[c.referralCode]=1; });
    const etiquetas = { todos:"Todas las personas con regalo", pendientes:"Por atender",
      claimed:"Estado: reclamado", contacted:"Estado: contactado", valid:"Estado: válido",
      scheduled:"Con cita agendada", entregados:"Obsequio entregado",
      sale_confirmed:"Con venta confirmada", no_response:"Sin respuesta", invalid:"No válidos" };
    return { participantes: rygParts.filter(function(p){ return codes[p.id]; }),
             claims: cs, etiqueta: (etiquetas[rygEF]||"Personas con regalo") };
  }

  function rygFilas(a){
    const porCodigo = {};
    a.participantes.forEach(p=>{ porCodigo[p.id]=p; });
    return a.claims.slice().sort((x,y)=>{
      const tx=x.claimedAt&&x.claimedAt.toDate?x.claimedAt.toDate().getTime():0;
      const ty=y.claimedAt&&y.claimedAt.toDate?y.claimedAt.toDate().getTime():0;
      return ty-tx;
    }).map(c=>{
      const p = porCodigo[c.referralCode] || {};
      const n = rygNivel(p.giftsDelivered||0, p.salesConfirmed||0);
      const entregado = (c.status==="gift_delivered"||c.status==="sale_confirmed");
      const venta = c.status==="sale_confirmed";
      const si = v => v ? "Sí" : "No";
      return {
        nombre: c.recipientName||"",
        telefono: rygTel(c.normalizedPhone),
        ciudad: c.recipientCity||"",
        recomendador: p.participantName||"",
        fecha: rygFecha(c.claimedAt),
        estado: (RYG_ST[c.status]||RYG_ST.claimed).t,
        entregado: si(entregado),
        venta: si(venta),
        nivel: n ? ("Nivel "+n+" · "+rygNombrePremio(n)) : "Sin nivel",
        // solo para CSV
        codigo: c.referralCode||"",
        cp: c.zipCode||"",
        fuente: c.source||"",
        notas: c.adminNotes||"",
        ventaFecha: (c.saleInfo&&c.saleInfo.date)||"",
        ventaProducto: (c.saleInfo&&c.saleInfo.product)||"",
        ventaOrden: (c.saleInfo&&c.saleInfo.orderNumber)||"",
        ventaMonto: (c.saleInfo&&c.saleInfo.amount)||"",
        recompensa: RYG_REW[p.rewardStatus]||""
      };
    });
  }

  function rygResumen(a){
    const cs = a.claims;
    const ent = cs.filter(c=>["gift_delivered","sale_confirmed"].indexOf(c.status)>=0).length;
    const ven = cs.filter(c=>c.status==="sale_confirmed").length;
    return {
      participantes: a.participantes.length,
      reclamos: cs.length,
      validos: cs.filter(c=>["valid","scheduled","gift_delivered","sale_confirmed"].indexOf(c.status)>=0).length,
      citas: cs.filter(c=>c.status==="scheduled").length,
      entregas: ent,
      ventas: ven,
      convE: cs.length ? Math.round(ent/cs.length*100)+"%" : "0%",
      convV: cs.length ? Math.round(ven/cs.length*100)+"%" : "0%"
    };
  }

  function rygSello(){
    const d=new Date(), p=n=>String(n).padStart(2,"0");
    return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"_"+p(d.getHours())+p(d.getMinutes());
  }

  window.rygCSV = async function(scope, code){
    const a = rygAlcance(scope, code);
    const filas = rygFilas(a);
    if(!filas.length){ toast("No hay registros para exportar"); return; }
    const cols = [
      ["Nombre","nombre"],["Teléfono","telefono"],["Ciudad","ciudad"],["Código postal","cp"],
      ["Recomendador","recomendador"],["Código","codigo"],["Fecha","fecha"],["Estado","estado"],
      ["Obsequio entregado","entregado"],["Compra confirmada","venta"],["Nivel o recompensa","nivel"],
      ["Estado del premio","recompensa"],["Fuente","fuente"],["Fecha de venta","ventaFecha"],
      ["Producto","ventaProducto"],["Orden","ventaOrden"],["Monto","ventaMonto"],["Notas","notas"]
    ];
    const q = v => '"'+String(v==null?"":v).replace(/"/g,'""')+'"';
    let csv = cols.map(c=>q(c[0])).join(",")+"\r\n";
    filas.forEach(f=>{ csv += cols.map(c=>q(f[c[1]])).join(",")+"\r\n"; });

    const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
    const a2 = document.createElement("a");
    a2.href = URL.createObjectURL(blob);
    a2.download = "regala-y-gana_"+rygSello()+".csv";
    document.body.appendChild(a2); a2.click();
    setTimeout(()=>{ URL.revokeObjectURL(a2.href); a2.remove(); }, 2000);

    await rygAudit("export_csv", scope==="participante"?code:"(varios)", a.etiqueta+" · "+filas.length+" registros", null, null);
    toast("✓ CSV descargado ("+filas.length+" registros)");
  };

  async function rygLogoDataURL(){
    try{
      const cfgLogo = (window.GIFT_CONFIG && window.GIFT_CONFIG.brand && window.GIFT_CONFIG.brand.logoPng) || "logo-regala-y-gana.png";
      const url = "regalo/" + cfgLogo.replace(/^\.?\//,"");
      const r = await fetch(url);
      if(!r.ok) return null;
      const b = await r.blob();
      return await new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=()=>res(null); fr.readAsDataURL(b); });
    }catch(e){ return null; }
  }

  window.rygBorrarParticipante = async function(code){
    const p = rygParts.find(x=>x.id===code);

    const cs = rygClaims.filter(x=>x.referralCode===code);
    const nom = p.participantName || code;
    if(!confirm('¿Eliminar la campaña de '+nom+'?\n\nSe enviarán a la papelera:\n· su campaña\n· su enlace personal (dejará de funcionar)\n· sus '+cs.length+' persona(s) con regalo\n\nPodrás restaurarlo durante 30 días.')) return;
    if(!confirm('Confirma una vez más: se eliminará '+nom+' y '+cs.length+' registro(s).')) return;
    try{
      for(const c of cs){
        const copia = {}; for(const k in c){ if(k!=="id") copia[k]=c[k]; }
        await softDelete("giftClaims", c.id, copia, (c.recipientName||"Persona")+" · "+nom, "Persona con regalo");

      try{

        if(lk.exists()) await softDelete("giftLinks", code, lk.data(), "Enlace de "+nom, "Enlace de campaña");
      }catch(e){}
      const copiaP = {}; for(const k in p){ if(k!=="id") copiaP[k]=p[k]; }
      await softDelete("giftParticipants", code, copiaP, nom+" · "+code, "Participante");
      try{ await deleteDoc(doc(db,"rewardRedemptions",code)); }catch(e){}
      await rygAudit("borrar_participante", code, "Campaña enviada a papelera con "+cs.length+" contacto(s)", "activa", "papelera");

      rygClaims = rygClaims.filter(x=>x.referralCode!==code);
      rygParts  = rygParts.filter(x=>x.id!==code);
      if(rygOpen===code) rygOpen = "";
      toast("✓ Campaña enviada a la papelera");

  // Siguiente paso lógico de cada contacto
  function rygSiguiente(estado){
    const mapa = {
      claimed:        ["contacted",      "Marcar contactado"],
      contacted:      ["valid",          "Marcar válido"],
      valid:          ["scheduled",      "Agendar cita"],
      scheduled:      ["gift_delivered", "Obsequio entregado"],
      gift_delivered: ["__venta",        "Confirmar venta"],
      no_response:    ["contacted",      "Marcar contactado"]
    };
    return mapa[estado] || null;
  }

  function rygBotonesContacto(c){
    const tel = String(c.normalizedPhone||"").replace(/\D/g,"");

    let h = '<div class="ryg-acts">';

    if(sig){

      h += '<button class="'+clase+'" type="button" onclick="'+accion+'">'+sig[1]+'</button>';
    }

      h += '<a class="ryg-b wa" href="https://wa.me/'+tel+'" target="_blank" rel="noopener">WhatsApp</a>';
      h += '<a class="ryg-b" href="tel:+'+tel+'">Llamar</a>';

  function rygDestinatarios(){
    let cs = rygClaims.filter(c=>!c.archived);
    if(rygEF !== "todos"){
      if(rygEF === "entregados") cs = cs.filter(c=>["gift_delivered","sale_confirmed"].indexOf(c.status)>=0);
      else if(rygEF === "pendientes") cs = cs.filter(c=>["claimed","contacted","valid","scheduled"].indexOf(c.status)>=0);
      else cs = cs.filter(c=>c.status===rygEF);
    }
    return cs.sort(function(a,b){
      const ta=a.claimedAt&&a.claimedAt.toDate?a.claimedAt.toDate().getTime():0;
      const tb=b.claimedAt&&b.claimedAt.toDate?b.claimedAt.toDate().getTime():0;
      return tb-ta;
    });
  }

  function rygPintar(){
    const el = $("p-regalayg");
    if(!el) return;
    rygEstilos();
    const y = window.scrollY;

    const vivos   = rygClaims.filter(c=>!c.archived);
    const activos = rygParts.filter(p=>!rygVencida(p)).length;
    const tot     = vivos.length;
    const validos = vivos.filter(c=>["valid","scheduled","gift_delivered","sale_confirmed"].indexOf(c.status)>=0).length;
    const citas   = vivos.filter(c=>c.status==="scheduled").length;
    const entreg  = vivos.filter(c=>["gift_delivered","sale_confirmed"].indexOf(c.status)>=0).length;
    const ventas  = vivos.filter(c=>c.status==="sale_confirmed").length;
    const desbloq = rygParts.filter(p=>(p.currentLevel||0)>0).length;
    const entregP = rygParts.filter(p=>p.rewardStatus==="delivered").length;
    const porVal  = rygParts.filter(p=>p.rewardStatus==="pending_validation").length;
    const cE = tot ? Math.round(entreg/tot*100) : 0;
    const cV = tot ? Math.round(ventas/tot*100) : 0;

    let h = '';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">';
    h += '<h3 style="font-size:17px;font-family:\'Inter Tight\',sans-serif">Regala y Gana</h3>';
    h += '<button class="ryg-b sm" type="button" onclick="rygRecargar()">Actualizar</button></div>';

    h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px">';
    [['Participantes activos',activos],['Personas con regalo',tot],['Contactos válidos',validos],
     ['Citas agendadas',citas],['Obsequios entregados',entreg],['Ventas confirmadas',ventas],
     ['Premios desbloqueados',desbloq],['Premios entregados',entregP]].forEach(function(x){
      h += '<div class="stat-card" style="background:#fff;border:1px solid #E9E6E0;border-radius:16px;padding:16px;text-align:center">'+
           '<div style="font-size:26px;font-weight:800;font-family:\'Inter Tight\',sans-serif">'+x[1]+'</div>'+
           '<div style="font-size:12px;color:#66625B;margin-top:4px">'+x[0]+'</div></div>';
    });
    h += '</div>';

    h += '<div class="card-form" style="margin-top:12px"><div style="display:flex;gap:22px;flex-wrap:wrap">'+
         '<div><div style="font-size:12px;color:#66625B">Reclamos a entregas</div><div style="font-size:22px;font-weight:800;font-family:\'Inter Tight\',sans-serif">'+cE+'%</div></div>'+
         '<div><div style="font-size:12px;color:#66625B">Reclamos a ventas</div><div style="font-size:22px;font-weight:800;font-family:\'Inter Tight\',sans-serif">'+cV+'%</div></div>'+
         '</div></div>';

    if(porVal){
      h += '<div class="card-form" style="margin-top:12px;border-left:4px solid #B08D4F">'+
           '<b style="font-size:14.5px">'+porVal+' recompensa'+(porVal>1?'s':'')+' por validar.</b>'+
           '<div class="hint" style="margin-top:4px">Están en la pestaña Participantes.</div></div>';
    }

    // ---- Navegación entre las dos vistas ----
    h += '<div class="ryg-nav">'+
         '<button type="button" class="'+(rygView==="participantes"?"on":"")+'" onclick="rygVista(\'participantes\')">Quienes participan ('+rygParts.length+')</button>'+
         '<button type="button" class="'+(rygView==="regalos"?"on":"")+'" onclick="rygVista(\'regalos\')">Quienes reciben regalo ('+tot+')</button>'+
         '</div>';

    if(rygView === "regalos"){
      // ============ QUIENES RECIBEN REGALO ============
      const filtros = [["todos","Todos"],["pendientes","Por atender"],["claimed","Reclamado"],
                       ["contacted","Contactado"],["valid","Válido"],["scheduled","Con cita"],
                       ["entregados","Entregados"],["sale_confirmed","Con venta"],
                       ["no_response","Sin respuesta"],["invalid","No válidos"]];
      h += '<div class="card-form"><div class="ryg-lbl">Filtrar por estado</div><div class="ryg-chips">';
      filtros.forEach(function(f){
        h += '<button class="ryg-chip'+(rygEF===f[0]?' on':'')+'" type="button" onclick="rygEstadoFiltro(\''+f[0]+'\')">'+f[1]+'</button>';
      });
      h += '</div></div>';

      const lista = rygDestinatarios();

      h += '<div class="card-form" style="margin-top:12px"><h3 style="font-size:16px;margin-bottom:4px">Descargar esta lista</h3>';
      h += '<p class="hint" style="margin-bottom:10px">'+lista.length+' persona'+(lista.length===1?'':'s')+' según el filtro. Cada descarga queda registrada en la auditoría.</p>';
      h += '<div class="ryg-acts" style="margin-top:0">'+
           '<button class="ryg-b next" type="button" onclick="rygPDF(\'regalos\')">Descargar PDF</button>'+
           '<button class="ryg-b" type="button" onclick="rygCSV(\'regalos\')">Descargar CSV</button>'+
           '<button class="ryg-b soft" type="button" onclick="rygImprimir(\'regalos\')">Imprimir</button>'+
           '</div></div>';

      h += '<div class="card-form" style="margin-top:12px"><h3 style="font-size:16px;margin-bottom:10px">Personas que reciben regalo ('+lista.length+')</h3>';
      if(!lista.length) h += '<div class="empty-note">No hay personas con este filtro.</div>';
      else lista.forEach(function(c){ h += rygFichaContacto(c, true); });
      h += '</div>';

    }else{
      // ============ QUIENES PARTICIPAN ============
      const filtros = [["todos","Todos"],["activos","Activos"],["premio","Con premio"],["vencidos","Finalizados"]];
      h += '<div class="card-form"><div class="ryg-lbl">Filtrar campañas</div><div class="ryg-chips">';
      filtros.forEach(function(f){
        h += '<button class="ryg-chip'+(rygFilter===f[0]?' on':'')+'" type="button" onclick="rygFiltrar(\''+f[0]+'\')">'+f[1]+'</button>';
      });
      h += '</div></div>';

      h += '<div class="card-form" style="margin-top:12px"><h3 style="font-size:16px;margin-bottom:4px">Descargar participantes</h3>';
      h += '<p class="hint" style="margin-bottom:10px">Incluye a sus contactos según el filtro elegido.</p>';
      h += '<div class="ryg-acts" style="margin-top:0">'+
           '<button class="ryg-b next" type="button" onclick="rygPDF(\'filtrado\')">Descargar PDF</button>'+
           '<button class="ryg-b" type="button" onclick="rygCSV(\'filtrado\')">Descargar CSV</button>'+
           '<button class="ryg-b soft" type="button" onclick="rygImprimir(\'filtrado\')">Imprimir</button>'+
           '</div></div>';

      let lista = rygParts.slice();
      if(rygFilter==="activos")  lista = lista.filter(p=>!rygVencida(p));
      if(rygFilter==="vencidos") lista = lista.filter(p=>rygVencida(p));
      if(rygFilter==="premio")   lista = lista.filter(p=>(p.currentLevel||0)>0);

      h += '<div class="card-form" style="margin-top:12px"><h3 style="font-size:16px;margin-bottom:10px">Participantes ('+lista.length+')</h3>';
      if(!lista.length){
        h += '<div class="empty-note">Aún no hay participantes en esta vista.</div>';
      }else{
        lista.forEach(function(p){
          const n = rygCuenta(p.id);
          const nivel = rygNivel(n.entregados, n.ventas);
          const venc = rygVencida(p);
          const abierto = rygOpen===p.id;

          h += '<div class="ryg-card">';
          h += '<div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">'+
               '<div style="min-width:0"><b style="font-size:15.5px">'+rygEsc(p.participantName||"—")+'</b>'+
               '<div style="font-size:12.5px;color:#66625B;margin-top:3px">'+rygEsc(p.city||"—")+' · '+rygEsc(p.id)+'</div></div>'+
               '<span class="ryg-badge" style="'+(venc?'background:#F3F1EC;color:#66625B':'background:#EAF5EE;color:#1E7A46')+'">'+
               (venc?'Finalizada':'Activa')+'</span></div>';

          h += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:13px;color:#66625B">'+
               '<span>Regalos enviados <b style="color:#111">'+n.total+'</b></span>'+
               '<span>Entregados <b style="color:#111">'+n.entregados+'</b></span>'+
               '<span>Ventas <b style="color:#111">'+n.ventas+'</b></span></div>';
          h += '<div style="font-size:12.5px;color:#9A968E;margin-top:5px">Inicio '+rygFecha(p.startsAt)+' · Vence '+rygFecha(p.expiresAt)+'</div>';

          if(nivel>0){
            h += '<div style="margin-top:11px;background:#FDFBF6;border:1px solid #EADFC9;border-radius:12px;padding:11px">'+
                 '<div style="font-size:11.5px;color:#8A672B;font-weight:700;letter-spacing:.04em">NIVEL '+nivel+' · '+rygEsc(RYG_REW[p.rewardStatus]||"Por validar").toUpperCase()+'</div>'+
                 '<div style="font-size:14.5px;font-weight:700;margin-top:3px">'+rygEsc(rygNombrePremio(nivel))+'</div>'+
                 '<div class="ryg-acts">'+
                 '<button class="ryg-b sm ok" type="button" onclick="rygSetPremio(\''+p.id+'\',\'approved\')">Aprobar</button>'+
                 '<button class="ryg-b sm gold" type="button" onclick="rygSetPremio(\''+p.id+'\',\'delivered\')">Marcar entregada</button>'+
                 '<button class="ryg-b sm soft" type="button" onclick="rygSetPremio(\''+p.id+'\',\'substituted\')">Sustituir</button>'+
                 '<button class="ryg-b sm danger" type="button" onclick="rygSetPremio(\''+p.id+'\',\'rejected\')">No aprobar</button>'+
                 '</div></div>';
          }

          h += '<div class="ryg-acts">'+
               '<button class="ryg-b'+(abierto?'':' next')+'" type="button" onclick="rygAbrir(\''+p.id+'\')">'+
               (abierto ? 'Ocultar sus regalos' : 'Ver sus regalos ('+n.total+')')+'</button>'+
               '<button class="ryg-b sm soft" type="button" onclick="rygPDF(\'participante\',\''+p.id+'\')">PDF</button>'+
               '<button class="ryg-b sm soft" type="button" onclick="rygCSV(\'participante\',\''+p.id+'\')">CSV</button>'+
               '<button class="ryg-b sm danger" type="button" onclick="rygBorrarParticipante(\''+p.id+'\')">Eliminar</button>'+
               '</div>';

          if(abierto){
            const cs = rygDeParticipante(p.id).slice().sort(function(a,b){
              const ta=a.claimedAt&&a.claimedAt.toDate?a.claimedAt.toDate().getTime():0;
              const tb=b.claimedAt&&b.claimedAt.toDate?b.claimedAt.toDate().getTime():0;
              return tb-ta;
            });
            h += '<div class="ryg-sep">';
            if(!cs.length) h += '<div class="empty-note">Todavía nadie ha reclamado con su enlace.</div>';
            else cs.forEach(function(c){ h += rygFichaContacto(c, false); });
            h += '</div>';
          }
          h += '</div>';
        });
      }
      h += '</div>';
    }

    el.innerHTML = h;
    window.scrollTo({ top:y });
  }



  $("tabs").addEventListener("click",(e)=>{
    const b=e.target.closest(".tab"); if(!b) return;
    window.goTab(b.dataset.tab);
  });
</script>
</body>
</html>
